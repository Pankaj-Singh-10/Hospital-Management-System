{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <h2 class="text-3xl font-bold mb-6 text-center text-gray-800">Login to Your Account</h2>
        
        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-gray-700 font-medium mb-2">Username</label>
                <input type="text" name="username" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div>
                <label class="block text-gray-700 font-medium mb-2">Password</label>
                <input type="password" name="password" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 font-medium text-lg transition">
                Login
            </button>
        </form>
        
        <div class="mt-6 text-center text-gray-600">
            Don't have an account? 
            <a href="{% url 'doctor_signup' %}" class="text-blue-600 hover:underline">Register as Doctor</a> or 
            <a href="{% url 'patient_signup' %}" class="text-green-600 hover:underline">Patient</a>
        </div>
    </div>
</div>
{% endblock %}
