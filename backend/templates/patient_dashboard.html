{% extends 'base.html' %}

{% block content %}
<h1 class="text-3xl font-bold text-gray-800 mb-8">Available Doctors</h1>

<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for doctor in doctors %}
        <div class="bg-white rounded-xl shadow-lg hover:shadow-xl transition overflow-hidden">
            <div class="bg-blue-600 h-2"></div>
            <div class="p-6">
                <h2 class="text-2xl font-bold mb-2 text-gray-800">Dr. {{ doctor.user.get_full_name }}</h2>
                <p class="text-blue-600 font-medium mb-4">{{ doctor.specialization }}</p>
                
                <div class="space-y-2 text-gray-600 mb-6">
                    <p>📧 {{ doctor.user.email }}</p>
                </div>
                
                <a href="{% url 'doctor_slots' doctor.id %}" 
                   class="block text-center bg-blue-600 text-white px-4 py-3 rounded-lg hover:bg-blue-700 font-medium transition">
                    View Available Slots →
                </a>
            </div>
        </div>
    {% empty %}
        <div class="col-span-3 text-center py-12">
            <p class="text-gray-500 text-xl">No doctors available at the moment</p>
        </div>
    {% endfor %}
</div>
{% endblock %}
